name: Discord Bot Schedule Messages

on:
  workflow_dispatch:
  schedule:
    # - cron: '45 23 * * *'  # Chạy lúc 6:45 UTC+7 (đêm)
    # - cron: '45 17 * * *'  # Chạy lúc 6:45 UTC+7 (đêm)
    # - cron: '45 16 * * *'  # Chạy lúc 22:45 UTC+7 (sáng)
    # - cron: '45 4 * * *'     # 11:45 VN
jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        npm install
        npm install pm2@latest -g

    - name: Create env file
      run: |
        TOKEN="${{ secrets.DISCORD_BOT_KEY }}"
        if [ -z "$TOKEN" ]; then
          TOKEN="${{ secrets.DISCORD_TOKEN }}"
        fi

        if [ -z "$TOKEN" ]; then
          echo "❌ Thiếu secret token. Hãy tạo DISCORD_BOT_KEY hoặc DISCORD_TOKEN trong GitHub Secrets."
          exit 1
        fi

        if [ -z "${{ secrets.CHANNEL_ID }}" ]; then
          echo "❌ Thiếu CHANNEL_ID trong GitHub Secrets."
          exit 1
        fi

        echo "DISCORD_TOKEN=$TOKEN" > .env
        echo "CHANNEL_ID=${{ secrets.CHANNEL_ID }}" >> .env
        echo "N8N_WEBHOOK_URL=${{ secrets.N8N_WEBHOOK_URL }}" >> .env
        echo "AI_LISTEN_CHANNEL_IDS=${{ vars.AI_LISTEN_CHANNEL_IDS }}" >> .env
        echo "AI_REPLY_IN_THREAD=${{ vars.AI_REPLY_IN_THREAD }}" >> .env
        echo "N8N_TIMEOUT_MS=${{ vars.N8N_TIMEOUT_MS }}" >> .env

    - name: Run Bot
      run: node run-scheduled.js
