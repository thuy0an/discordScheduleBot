name: Discord Bot Schedule Messages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'   # 00:00 giờ Việt Nam
    - cron: '0 0 * * *'    # 07:00 giờ Việt Nam
    - cron: '0 1 * * *'    # 08:00 giờ Việt Nam, chỉ gửi vào ngày đặc biệt
    - cron: '0 5 * * *'    # 12:00 giờ Việt Nam
jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        npm install
        npm install pm2@latest -g

    - name: Create env file
      run: |
        TOKEN="${{ secrets.DISCORD_BOT_KEY }}"
        if [ -z "$TOKEN" ]; then
          TOKEN="${{ secrets.DISCORD_TOKEN }}"
        fi

        if [ -z "$TOKEN" ]; then
          echo "❌ Thiếu secret token. Hãy tạo DISCORD_BOT_KEY hoặc DISCORD_TOKEN trong GitHub Secrets."
          exit 1
        fi

        if [ -z "${{ secrets.CHANNEL_ID }}" ]; then
          echo "❌ Thiếu CHANNEL_ID trong GitHub Secrets."
          exit 1
        fi

        echo "DISCORD_TOKEN=$TOKEN" > .env
        echo "CHANNEL_ID=${{ secrets.CHANNEL_ID }}" >> .env

    - name: Run Bot
      run: node run-scheduled.js
